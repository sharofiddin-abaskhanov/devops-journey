services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=devops
      - DB_USER=admin
      - DB_PASS=secret
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=devops
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
